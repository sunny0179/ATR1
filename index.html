<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSAW ATR Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET */
        *{box-sizing:border-box;margin:0;padding:0}
        
        body {
            font-family: 'Inter', sans-serif;
            /* BACKGROUND RESTORED */
            background: linear-gradient(rgba(224, 242, 254, 0.8), rgba(224, 242, 254, 0.8)), 
                        url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1e3a8a;
            display: flex;
            align-items: flex-start; /* Aligns content to top */
            justify-content: flex-start;
            min-height: 100vh;
            width: 100%;
        }

        .hidden{display:none !important}

        /* LOGIN SCREEN */
        #view-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(224, 242, 254, 0.9), rgba(224, 242, 254, 0.9)), 
                        url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            display: flex; align-items: center; justify-content: center; z-index: 5000;
        }
        .lcard {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid white;
        }

        /* SIDEBAR - PINNED TO TOP */
        #sidebar {
            width: 280px;
            min-width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .sb-header {
            padding: 30px 20px;
            color: #0369a1;
            font-weight: 800;
            font-size: 22px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            letter-spacing: -0.5px;
        }

        .menu-item {
            padding: 16px 25px;
            cursor: pointer;
            font-weight: 600;
            color: #334155;
            transition: 0.2s;
        }

        .menu-item.active {
            background: rgba(3, 105, 161, 0.15);
            color: #0369a1;
            border-right: 5px solid #0369a1;
        }

        /* MAIN AREA - START FROM TOP */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Ensures content starts at top */
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* GRID & FORMS */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

        label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #475569; display: block; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px;
            background: white; margin-bottom: 15px; font-size: 14px; outline: none;
        }
        input:focus { border-color: #0369a1; }

        .lbtn {
            background: #0369a1; color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%;
        }

        /* TABLE */
        .table-wrap { overflow-x: auto; border-radius: 15px; margin-top: 10px; }
        .et { width: 100%; border-collapse: collapse; min-width: 600px; background: rgba(255,255,255,0.3); }
        .et th { text-align: left; padding: 15px; background: rgba(3,105,161,0.1); font-size: 11px; color: #0369a1; }
        .et td { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; }
    </style>
</head>
<body>

    <div id="view-login">
        <div class="lcard">
            <h2 style="color:#0369a1; margin-bottom:5px">JINDAL SAW</h2>
            <p style="font-size:12px; color:#64748b; margin-bottom:25px">ATR Management System</p>
            <input type="text" id="uid" placeholder="Employee ID">
            <input type="password" id="upw" placeholder="Password" onkeypress="if(event.key === 'Enter') app.login()">
            <button class="lbtn" onclick="app.login()">Login</button>
        </div>
    </div>

    <nav id="sidebar" class="hidden">
        <div class="sb-header">JINDAL SAW</div>
        <div class="sb-menu">
            <div id="m-creator" class="menu-item hidden" onclick="app.showSec('sec-creator')">Create ATR Task</div>
            <div id="m-tasks" class="menu-item" onclick="app.showSec('sec-tasks')">Pending Actions</div>
            <div id="m-report" class="menu-item" onclick="app.showSec('sec-report')">ATR History</div>
            <div class="menu-item" onclick="location.reload()" style="color:#ef4444; margin-top:30px">Logout</div>
        </div>
    </nav>

    <main id="main-content" class="hidden">
        <div class="container">
            
            <div id="sec-creator" class="sec hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:25px; color:#0369a1">Assign New Task</h3>
                    <div class="grid-2">
                        <div style="grid-column: span 2">
                            <label>Task Description</label>
                            <textarea id="t-desc" rows="2" placeholder="What needs to be done?"></textarea>
                        </div>
                        <div><label>Zone</label><select id="z-sel" onchange="app.mapDept()"></select></div>
                        <div><label>Department</label><select id="d-sel" onchange="app.mapSub()"></select></div>
                        <div><label>Sub-Department</label><select id="s-sel" onchange="app.mapResp()"></select></div>
                        <div><label>Target Date</label><input type="date"></div>
                        <div style="grid-column: span 2"><label>Responsible Person</label><input type="text" id="t-resp" readonly placeholder="Auto-mapped..."></div>
                    </div>
                    <button class="lbtn" onclick="app.assignTask()">Assign ATR</button>
                </div>
            </div>

            <div id="sec-tasks" class="sec hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:20px; color:#0369a1">Pending Actions</h3>
                    <div class="table-wrap">
                        <table class="et">
                            <thead><tr><th>ID</th><th>Task</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody id="pending-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const app = {
            user: null, tasks: [],
            mapping: [
                {z:"Operations & Projects", d:"CCM", s:"Hot Mould-CCM", r:"Mr. Vikash Pareek"},
                {z:"Quality", d:"Quality Assurance", s:"Lab", r:"Mr. Kamalkant Sharma"}
            ],

            init: function() {
                const saved = localStorage.getItem('jsaw_atr_tasks');
                this.tasks = saved ? JSON.parse(saved) : [];
                this.initZones();
            },

            login: function() {
                const id = document.getElementById('uid').value;
                if(!id) return alert("Please enter User ID");
                this.user = { id, role: id.startsWith('1') ? 'HOD' : 'MID' };
                
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                if(this.user.role === 'HOD') {
                    document.getElementById('m-creator').classList.remove('hidden');
                    this.showSec('sec-creator');
                } else {
                    this.showSec('sec-tasks');
                }
                this.renderTables();
            },

            showSec: function(id) {
                document.querySelectorAll('.sec').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                document.getElementById(id).classList.remove('hidden');
                const mId = id.replace('sec-', 'm-');
                if(document.getElementById(mId)) document.getElementById(mId).classList.add('active');
                window.scrollTo(0,0);
            },

            initZones: function() {
                const zones = [...new Set(this.mapping.map(m => m.z))];
                document.getElementById('z-sel').innerHTML = '<option value="">Select Zone</option>' + zones.map(z => `<option>${z}</option>`).join('');
            },

            mapDept: function() {
                const z = document.getElementById('z-sel').value;
                const depts = [...new Set(this.mapping.filter(m => m.z === z).map(m => m.d))];
                document.getElementById('d-sel').innerHTML = '<option value="">Select Dept</option>' + depts.map(d => `<option>${d}</option>`).join('');
            },

            mapSub: function() {
                const d = document.getElementById('d-sel').value;
                const subs = this.mapping.filter(m => m.d === d).map(m => m.s);
                document.getElementById('s-sel').innerHTML = '<option value="">Select Sub</option>' + subs.map(s => `<option>${s}</option>`).join('');
            },

            mapResp: function() {
                const s = document.getElementById('s-sel').value;
                const match = this.mapping.find(m => m.s === s);
                document.getElementById('t-resp').value = match ? match.r : "";
            },

            assignTask: function() {
                const desc = document.getElementById('t-desc').value;
                if(!desc) return alert("Enter task description");
                this.tasks.push({id: "ATR-"+Math.floor(Math.random()*900+100), desc, status: "Open"});
                localStorage.setItem('jsaw_atr_tasks', JSON.stringify(this.tasks));
                this.renderTables();
                this.showSec('sec-tasks');
                document.getElementById('t-desc').value = "";
            },

            renderTables: function() {
                const body = document.getElementById('pending-body');
                body.innerHTML = this.tasks.map(t => `
                    <tr><td>${t.id}</td><td>${t.desc}</td><td><span style="color:#f59e0b;font-weight:700">${t.status}</span></td><td><button style="padding:5px 10px; cursor:pointer">View</button></td></tr>
                `).join('');
            }
        };
        app.init();
    </script>
</body>
</html>
