<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSAW ATR Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET */
        *{box-sizing:border-box;margin:0;padding:0}
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(224, 242, 254, 0.8), rgba(224, 242, 254, 0.8)), 
                        url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1e3a8a;
            display: flex;
            align-items: flex-start; /* FIX: Align items to top, not center */
            justify-content: flex-start; /* FIX: Start from left */
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        .hidden{display:none !important}

        /* SIDEBAR - PINNED TO TOP LEFT */
        #sidebar {
            width: 280px;
            min-width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .sb-header {
            padding: 25px 20px;
            color: #0369a1;
            font-weight: 800;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            /* This ensures "JINDAL SAW" stays at the very top */
            display: block; 
        }

        .sb-menu {
            flex-grow: 1;
            padding-top: 10px;
        }

        .menu-item {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: 600;
            color: #334155;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .menu-item.active {
            background: rgba(3, 105, 161, 0.1);
            color: #0369a1;
            border-right: 4px solid #0369a1;
        }

        /* MAIN CONTENT - STARTS FROM TOP */
        #main-content {
            flex-grow: 1;
            width: calc(100% - 280px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the form horizontally */
            justify-content: flex-start; /* FIX: Ensures content starts at the top */
        }

        .container {
            width: 100%;
            max-width: 1000px;
            /* No margin-top auto, so it stays at the top */
        }

        /* GLASS CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* FORM STYLING */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label { 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #64748b; 
            margin-bottom: 6px; 
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #fff;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .lbtn {
            background: #0369a1;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        /* TABLE */
        .table-wrap { overflow-x: auto; margin-top: 10px; border-radius: 12px; }
        .et { width: 100%; border-collapse: collapse; min-width: 600px; background: rgba(255,255,255,0.4); }
        .et th { text-align: left; padding: 15px; background: rgba(3, 105, 161, 0.05); font-size: 12px; color: #0369a1; }
        .et td { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; }

        /* MOBILE FIXES */
        @media (max-width: 1024px) {
            #sidebar { position: fixed; transform: translateX(-100%); height: 100%; }
            #sidebar.open { transform: translateX(0); }
            #main-content { width: 100%; padding: 80px 20px 20px 20px; }
            .grid-2 { grid-template-columns: 1fr; }
        }

        #view-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(224, 242, 254, 1);
            display: flex; align-items: center; justify-content: center; z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="view-login">
        <div class="glass-card" style="width: 350px; text-align: center;">
            <h2 style="color: #0369a1; margin-bottom: 20px;">JSAW Portal</h2>
            <input type="text" id="uid" placeholder="Employee ID">
            <input type="password" id="upw" placeholder="Password">
            <button class="lbtn" onclick="app.login()">Login</button>
        </div>
    </div>

    <nav id="sidebar" class="hidden">
        <div class="sb-header">JINDAL SAW</div>
        <div class="sb-menu">
            <div id="m-creator" class="menu-item hidden" onclick="app.showSec('sec-creator')">Create ATR Task</div>
            <div id="m-tasks" class="menu-item" onclick="app.showSec('sec-tasks')">Pending Actions</div>
            <div id="m-report" class="menu-item" onclick="app.showSec('sec-report')">History Report</div>
            <div class="menu-item" onclick="location.reload()" style="color:#ef4444; margin-top:20px; border-top:1px solid rgba(0,0,0,0.05)">Logout</div>
        </div>
    </nav>

    <main id="main-content" class="hidden">
        <div class="container">
            
            <div id="sec-creator" class="sec hidden">
                <div class="glass-card">
                    <h2 style="margin-bottom:20px; color: #0369a1;">Assign New Task</h2>
                    <div class="grid-2">
                        <div style="grid-column: span 2">
                            <label>Description of ATR</label>
                            <textarea id="t-desc" rows="3" placeholder="Describe the required action..."></textarea>
                        </div>
                        <div>
                            <label>Zone</label>
                            <select id="z-sel" onchange="app.mapDept()">
                                <option value="">Select Zone</option>
                                <option>Operations & Projects</option>
                            </select>
                        </div>
                        <div>
                            <label>Department</label>
                            <select id="d-sel" onchange="app.mapSub()">
                                <option value="">Select Dept</option>
                            </select>
                        </div>
                        <div><label>Subdepartment</label><select id="s-sel"></select></div>
                        <div><label>Target Date</label><input type="date"></div>
                    </div>
                    <button class="lbtn" onclick="app.showSec('sec-tasks')">Assign Task</button>
                </div>
            </div>

            <div id="sec-tasks" class="sec hidden">
                <div class="glass-card">
                    <h2 style="margin-bottom:20px; color: #0369a1;">Pending Task List</h2>
                    <div class="table-wrap">
                        <table class="et">
                            <thead>
                                <tr><th>ATR ID</th><th>Task</th><th>Responsibility</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>ATR-901</td><td>CCM Maintenance</td><td>Vikash Pareek</td><td><span style="color:#f59e0b">Open</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const app = {
            login: function() {
                const id = document.getElementById('uid').value;
                if(!id) return alert("Enter ID");
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                if(id.startsWith('1')) {
                    document.getElementById('m-creator').classList.remove('hidden');
                    this.showSec('sec-creator');
                } else {
                    this.showSec('sec-tasks');
                }
            },
            showSec: function(id) {
                document.querySelectorAll('.sec').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                document.getElementById(id).classList.remove('hidden');
                const mId = id.replace('sec-', 'm-');
                if(document.getElementById(mId)) document.getElementById(mId).classList.add('active');
                window.scrollTo(0,0); // FIX: Ensure page starts at top when switching
            },
            mapDept: function() {
                document.getElementById('d-sel').innerHTML = '<option>CCM</option><option>Quality</option>';
            },
            mapSub: function() {
                document.getElementById('s-sel').innerHTML = '<option>Maintenance</option><option>Lab</option>';
            }
        };
    </script>
</body>
</html>
