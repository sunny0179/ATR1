<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSAW ATR Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* All existing CSS styles remain exactly as they were */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0b1120;color:#dde6f0;display:flex;min-height:100vh;overflow-x:hidden}
        .hidden{display:none !important}
        #view-login{position:fixed;top:0;left:0;width:100%;height:100%;background:#0b1120;z-index:5000;display:flex;align-items:center;justify-content:center;padding:20px}
        .lcard{background:rgba(14,26,48,.98);border:1px solid rgba(30,111,255,.3);border-radius:22px;padding:35px;width:100%;max-width:380px;text-align:center}
        #sidebar{width:260px;background:#060d1a;border-right:1px solid #152540;display:flex;flex-direction:column;transition:0.3s}
        .sb-header{padding:30px 20px;color:#1e6fff;font-weight:700;font-size:20px;border-bottom:1px solid #152540}
        .menu-item{padding:15px 25px;color:#8899ac;cursor:pointer;font-size:14px;transition:0.2s}
        .menu-item.active{background:rgba(30,111,255,0.1);color:#1e6fff;border-right:3px solid #1e6fff}
        #main-content{flex-grow:1;overflow-y:auto;height:100vh;-webkit-overflow-scrolling:touch}
        .container{padding:15px;max-width:1200px;margin:0 auto}
        .card{background:#0c1828;border:1px solid #1a3050;border-radius:15px;padding:20px;margin-bottom:20px}
        label{font-size:11px;color:#4a6a8a;font-weight:700;text-transform:uppercase;display:block;margin-bottom:8px}
        input, textarea, select{width:100%;background:#0a1426;border:1px solid #1a3050;border-radius:10px;padding:14px;color:#fff;outline:none;margin-bottom:15px;font-size:16px}
        .lbtn{background:linear-gradient(135deg,#1e6fff,#0a4fd4);border:none;border-radius:10px;padding:16px;color:#fff;font-weight:600;cursor:pointer;font-size:15px}
        .table-wrap{width:100%;overflow-x:auto;border-radius:10px;border:1px solid #152540}
        .et{width:100%;border-collapse:collapse;min-width:600px}
        .et th{background:#0a1f3d;color:#4a9eff;padding:12px;text-align:left;font-size:11px;text-transform:uppercase}
        .et td{padding:12px;border-bottom:1px solid #152540;font-size:13px}
        .modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:4000}
        .modal-box{background:#0f1a2d;border:1px solid #1e6fff;border-radius:18px;width:95%;max-width:600px;max-height:90vh;padding:25px;overflow-y:auto}
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #152540; }
            .sb-menu { display: flex; overflow-x: auto; }
            .menu-item { white-space: nowrap; padding: 15px 20px; border-bottom: none; }
            .modal-bg { align-items: flex-end; }
            .modal-box { border-radius: 20px 20px 0 0; border-bottom: none; }
            .creator-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

    <div id="view-login">
        <div class="lcard">
            <h2 style="margin-bottom:25px">JSAW ATR Portal</h2>
            <input type="text" id="uid" placeholder="ID (1000 or 2001)">
            <input type="password" id="upw" placeholder="Password (init123)">
            <button class="lbtn" style="width:100%" onclick="app.login()">Login</button>
        </div>
    </div>

    <nav id="sidebar" class="hidden">
        <div class="sb-header">JINDAL SAW</div>
        <div class="sb-menu">
            <div id="m-creator" class="menu-item hidden" onclick="app.showSec('sec-creator')">➤ ATR Creator</div>
            <div id="m-tasks" class="menu-item" onclick="app.showSec('sec-tasks')">➤ Pending Actions</div>
            <div id="m-report" class="menu-item" onclick="app.showSec('sec-report')">➤ ATR Report Menu</div>
            <div class="menu-item" onclick="app.logout()" style="color:#ef4444">➤ Log Out</div>
        </div>
    </nav>

    <main id="main-content" class="hidden">
        <div class="container">
            <div id="sec-creator" class="sec hidden">
                <div class="card">
                    <h3 style="color:#1e6fff; margin-bottom:20px">Create New ATR Task</h3>
                    <div class="creator-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                        <div style="grid-column: span 2"><label>Task Description</label><textarea id="t-desc" rows="2"></textarea></div>
                        <div><label>Zone</label><select id="z-sel" onchange="app.mapDept()"></select></div>
                        <div><label>Department</label><select id="d-sel" onchange="app.mapSub()"></select></div>
                        <div><label>Subdepartment</label><select id="s-sel" onchange="app.mapResp()"></select></div>
                        <div><label>Primary Responsible</label><input type="text" id="t-resp" readonly></div>
                    </div>
                    <button class="lbtn" style="width:100%" onclick="app.assignTask()">Assign Task</button>
                </div>
            </div>

            <div id="sec-tasks" class="sec hidden">
                <div class="card">
                    <h3 style="color:#1e6fff; margin-bottom:15px">Current Pending Tasks</h3>
                    <div class="table-wrap">
                        <table class="et">
                            <thead><tr><th>ID</th><th>Task</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody id="pending-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="sec-report" class="sec hidden">
                <div class="card">
                    <h3 style="color:#1e6fff; margin-bottom:15px">ATR Report History</h3>
                    <div class="table-wrap">
                        <table class="et">
                            <thead><tr><th>ID</th><th>Essence</th><th>Action</th><th>Status</th></tr></thead>
                            <tbody id="report-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-fill" class="modal-bg hidden">
        <div class="modal-box">
            <h3 id="m-id" style="color:#1e6fff; margin-bottom:20px"></h3>
            <div id="mid-fields">
                <label>Essence of Work*</label><textarea id="inp-essence" rows="3"></textarea>
                <label>Detailed Action Taken</label><textarea id="inp-action" rows="3"></textarea>
                <label>Attachment</label><input type="file" id="inp-file">
            </div>
            <div id="hod-fields" class="hidden">
                <div style="background:rgba(30,111,255,0.05); padding:15px; border-radius:10px; margin-bottom:20px">
                    <p id="view-essence" style="font-size:14px; margin-bottom:10px"></p>
                    <p id="view-action" style="font-size:14px"></p>
                </div>
                <label>HOD Remarks</label><textarea id="inp-remarks" rows="2"></textarea>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px">
                <button id="btn-submit" class="lbtn" onclick="app.submitAction()">Submit Review</button>
                <button id="btn-approve" class="lbtn hidden" style="background:#10b981" onclick="app.approveAction()">Approve & Close</button>
                <button class="lbtn" style="background:#334155" onclick="app.closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            user: null, activeATR: null,
            // UPDATED FULL MAPPING ARRAY
            mapping: [
                {z:"Operations & Projects", d:"CCM", s:"Hot Mould-CCM", r:"Mr. Vikash Pareek"},
                {z:"Operations & Projects", d:"CCM", s:"Cold Mould-CCM", r:"Mr. Sanjay Kumar"},
                {z:"Operations & Projects", d:"Melting", s:"Melting Shop", r:"Mr. Rajesh Sharma"},
                {z:"Quality", d:"Quality Assurance", s:"Lab", r:"Mr. Kamalkant Sharma"},
                {z:"Procurement", d:"Procurement Dept", s:"Strategic Sourcing", r:"Mr. Amit Verma"},
                {z:"Procurement", d:"Procurement Dept", s:"Compliance", r:"Ms. Neha Gupta"},
                {z:"HSE", d:"Health, Safety & Environment", s:"Environment", r:"Mr. Deepak Singh"}
            ],
            tasks: [],

            init: function() {
                const saved = localStorage.getItem('jsaw_atr_tasks');
                this.tasks = saved ? JSON.parse(saved) : [{id: "ATR-101", desc: "Line Maintenance", status: "Open", essence: "", action: "", file: "N/A"}];
            },
            save: function() { localStorage.setItem('jsaw_atr_tasks', JSON.stringify(this.tasks)); },

            login: function() {
                const id = document.getElementById('uid').value;
                if(document.getElementById('upw').value !== "init123") return alert("Wrong PW");
                this.user = { id, role: id.startsWith('1') ? 'HOD' : 'MID' };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                if(this.user.role === 'HOD') {
                    document.getElementById('m-creator').classList.remove('hidden');
                    this.initZones(); this.showSec('sec-creator');
                } else { this.showSec('sec-tasks'); }
                this.render();
            },

            logout: function() { location.reload(); },

            showSec: function(id) {
                document.querySelectorAll('.sec').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                document.getElementById(id).classList.remove('hidden');
                const mId = id.replace('sec-', 'm-');
                if(document.getElementById(mId)) document.getElementById(mId).classList.add('active');
            },

            render: function() {
                const p = document.getElementById('pending-body');
                const r = document.getElementById('report-body');
                p.innerHTML = ""; r.innerHTML = "";
                this.tasks.forEach(t => {
                    if(t.status === "Open" || t.status === "Review Pending") {
                        let btn = "";
                        if(this.user.role === 'MID') {
                            btn = t.status === "Open" ? `<button class="lbtn" style="padding:6px 12px; font-size:11px" onclick="app.openModal('${t.id}')">Fill</button>` : `<span style="color:#1e6fff">Sent</span>`;
                        } else {
                            btn = t.status === "Review Pending" ? `<button class="lbtn" style="background:#10b981; padding:6px 12px; font-size:11px" onclick="app.openModal('${t.id}')">Review</button>` : `<span style="color:#4a6a8a">Pending</span>`;
                        }
                        p.innerHTML += `<tr><td>${t.id}</td><td>${t.desc}</td><td>${t.status}</td><td>${btn}</td></tr>`;
                    } else if(t.status === "Closed") {
                        r.innerHTML += `<tr><td>${t.id}</td><td>${t.essence}</td><td>${t.action}</td><td style="color:#10b981">✔ Closed</td></tr>`;
                    }
                });
            },

            openModal: function(id) {
                this.activeATR = id; const task = this.tasks.find(x => x.id === id);
                document.getElementById('m-id').innerText = "Task: " + id;
                document.getElementById('modal-fill').classList.remove('hidden');
                if(this.user.role === 'HOD') {
                    document.getElementById('mid-fields').classList.add('hidden');
                    document.getElementById('hod-fields').classList.remove('hidden');
                    document.getElementById('btn-submit').classList.add('hidden');
                    document.getElementById('btn-approve').classList.remove('hidden');
                    document.getElementById('view-essence').innerText = "Essence: " + task.essence;
                    document.getElementById('view-action').innerText = "Action: " + task.action;
                } else {
                    document.getElementById('mid-fields').classList.remove('hidden');
                    document.getElementById('hod-fields').classList.add('hidden');
                    document.getElementById('btn-submit').classList.remove('hidden');
                    document.getElementById('btn-approve').classList.add('hidden');
                }
            },
            closeModal: function() { document.getElementById('modal-fill').classList.add('hidden'); },
            submitAction: function() {
                const e = document.getElementById('inp-essence').value;
                if(!e) return alert("Required");
                const t = this.tasks.find(x => x.id === this.activeATR);
                t.status = "Review Pending"; t.essence = e; t.action = document.getElementById('inp-action').value;
                this.save(); this.render(); this.closeModal();
            },
            approveAction: function() {
                const t = this.tasks.find(x => x.id === this.activeATR);
                t.status = "Closed"; this.save(); this.render(); this.closeModal(); this.showSec('sec-report');
            },
            assignTask: function() {
                const d = document.getElementById('t-desc').value;
                if(!d) return alert("Required");
                this.tasks.push({id: "ATR-"+(100+this.tasks.length+1), desc: d, status: "Open", essence: "", action: "", file: "N/A"});
                this.save(); this.render(); this.showSec('sec-tasks');
            },

            // REPAIRED DROPDOWN LOGIC
            initZones: function() {
                const z = [...new Set(this.mapping.map(m => m.z))];
                document.getElementById('z-sel').innerHTML = '<option value="">Select Zone</option>' + z.map(x => `<option value="${x}">${x}</option>`).join('');
            },
            mapDept: function() {
                const z = document.getElementById('z-sel').value;
                const filtered = this.mapping.filter(m => m.z === z);
                const d = [...new Set(filtered.map(m => m.d))];
                document.getElementById('d-sel').innerHTML = '<option value="">Select Dept</option>' + d.map(x => `<option value="${x}">${x}</option>`).join('');
                document.getElementById('s-sel').innerHTML = '<option value="">Select Sub-Dept</option>';
                document.getElementById('t-resp').value = "";
            },
            mapSub: function() {
                const d = document.getElementById('d-sel').value;
                const filtered = this.mapping.filter(m => m.d === d);
                const s = [...new Set(filtered.map(m => m.s))];
                document.getElementById('s-sel').innerHTML = '<option value="">Select Sub-Dept</option>' + s.map(x => `<option value="${x}">${x}</option>`).join('');
                document.getElementById('t-resp').value = "";
            },
            mapResp: function() {
                const s = document.getElementById('s-sel').value;
                const match = this.mapping.find(x => x.s === s);
                document.getElementById('t-resp').value = match ? match.r : "";
            }
        };
        app.init();
    </script>
</body>
</html>
