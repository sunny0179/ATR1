<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSAW ATR Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CORE UI */
        *{box-sizing:border-box;margin:0;padding:0}
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(224, 242, 254, 0.75), rgba(224, 242, 254, 0.75)), 
                        url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1e3a8a;
            display: flex; /* Key for Sidebar/Main alignment */
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
        }

        .hidden{display:none !important}

        /* SIDEBAR ALIGNMENT */
        #sidebar {
            width: 280px;
            min-width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        /* MAIN CONTENT ALIGNMENT */
        #main-content {
            flex-grow: 1;
            width: calc(100% - 280px); /* Ensures it takes remaining space */
            min-height: 100vh;
            overflow-y: auto;
        }

        .container {
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto; /* Centers the form in the right area */
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 1024px) {
            #sidebar {
                position: fixed;
                left: 0;
                transform: translateX(-100%);
            }
            #sidebar.open {
                transform: translateX(0);
            }
            #main-content {
                width: 100%;
                padding-top: 60px; /* Space for mobile nav */
            }
            .container {
                padding: 20px;
            }
        }

        /* MOBILE HEADER */
        .mobile-nav {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 900;
            align-items: center;
            justify-content: space-between;
        }

        @media (max-width: 1024px) { .mobile-nav { display: flex; } }

        /* GLASS CARD STYLING */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(31, 38, 135, 0.1);
        }

        /* FORM GRID */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        /* ELEMENTS */
        .sb-header {
            padding: 30px 20px;
            color: #0369a1;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .menu-item {
            padding: 16px 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .menu-item.active {
            background: rgba(3, 105, 161, 0.15);
            color: #0369a1;
            border-right: 5px solid #0369a1;
        }

        label { font-size: 11px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 8px; color: #475569; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(3, 105, 161, 0.2);
            background: white;
            margin-bottom: 10px;
        }

        .lbtn {
            background: #0369a1;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        /* TABLE */
        .table-wrap { overflow-x: auto; margin-top: 10px; border-radius: 15px; }
        .et { width: 100%; border-collapse: collapse; min-width: 600px; }
        .et th { text-align: left; padding: 15px; background: rgba(3, 105, 161, 0.1); font-size: 11px; }
        .et td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.4); font-size: 14px; }
    </style>
</head>
<body>

    <div class="mobile-nav hidden" id="mob-nav">
        <div style="font-size:24px; cursor:pointer" onclick="app.toggleSidebar()">☰</div>
        <div style="font-weight:800; color:#0369a1">JINDAL SAW</div>
        <div></div>
    </div>

    <nav id="sidebar" class="hidden">
        <div class="sb-header">JINDAL SAW</div>
        <div class="sb-menu">
            <div id="m-creator" class="menu-item hidden" onclick="app.showSec('sec-creator')">➤ Create ATR</div>
            <div id="m-tasks" class="menu-item" onclick="app.showSec('sec-tasks')">➤ Tasks</div>
            <div id="m-report" class="menu-item" onclick="app.showSec('sec-report')">➤ Reports</div>
            <div class="menu-item" onclick="app.logout()" style="color:#ef4444; margin-top:20px">➤ Logout</div>
        </div>
    </nav>

    <main id="main-content" class="hidden">
        <div class="container">
            
            <div id="sec-creator" class="sec hidden">
                <div class="glass-card">
                    <h2 style="margin-bottom:20px">Create New ATR</h2>
                    <div class="grid-2">
                        <div style="grid-column: span 2">
                            <label>Task Description</label>
                            <textarea id="t-desc" rows="2"></textarea>
                        </div>
                        <div><label>Zone</label><select id="z-sel" onchange="app.mapDept()"></select></div>
                        <div><label>Department</label><select id="d-sel" onchange="app.mapSub()"></select></div>
                        <div><label>Subdepartment</label><select id="s-sel" onchange="app.mapResp()"></select></div>
                        <div><label>Primary Responsible</label><input type="text" id="t-resp" readonly></div>
                    </div>
                    <button class="lbtn" onclick="app.assignTask()">Assign Task</button>
                </div>
            </div>

            <div id="sec-tasks" class="sec hidden">
                <div class="glass-card">
                    <h2 style="margin-bottom:20px">Pending Tasks</h2>
                    <div class="table-wrap">
                        <table class="et">
                            <thead><tr><th>ID</th><th>Task</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody id="pending-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="sec-report" class="sec hidden">
                <div class="glass-card">
                    <h2 style="margin-bottom:20px">History</h2>
                    <div class="table-wrap">
                        <table class="et">
                            <thead><tr><th>ID</th><th>Essence</th><th>Action</th><th>Status</th></tr></thead>
                            <tbody id="report-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="view-login">
        <div class="glass-card" style="width:360px; text-align:center">
            <h2 style="color:#0369a1; margin-bottom:20px">JSAW Portal</h2>
            <input type="text" id="uid" placeholder="User ID">
            <input type="password" id="upw" placeholder="Password">
            <button class="lbtn" onclick="app.login()">Login</button>
        </div>
    </div>

    <script>
        // Same logic as before, just ensuring sidebar/content toggle correctly
        const app = {
            user: null, tasks: [],
            mapping: [{z:"Operations", d:"CCM", s:"Mould", r:"Vikash Pareek"}],
            
            init: function() {
                const saved = localStorage.getItem('jsaw_atr_tasks');
                this.tasks = saved ? JSON.parse(saved) : [];
            },
            toggleSidebar: function() {
                document.getElementById('sidebar').classList.toggle('open');
            },
            login: function() {
                const id = document.getElementById('uid').value;
                this.user = { id, role: id.startsWith('1') ? 'HOD' : 'MID' };
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('mob-nav').classList.remove('hidden');
                if(this.user.role === 'HOD') {
                    document.getElementById('m-creator').classList.remove('hidden');
                    this.initZones(); this.showSec('sec-creator');
                } else { this.showSec('sec-tasks'); }
                this.renderTables();
            },
            showSec: function(id) {
                document.querySelectorAll('.sec').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                document.getElementById(id).classList.remove('hidden');
                const mId = id.replace('sec-', 'm-');
                if(document.getElementById(mId)) document.getElementById(mId).classList.add('active');
                if(window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
            },
            renderTables: function() {
                const pBody = document.getElementById('pending-body');
                pBody.innerHTML = this.tasks.map(t => `<tr><td>${t.id}</td><td>${t.desc}</td><td>${t.status}</td><td>Action</td></tr>`).join('');
            },
            assignTask: function() {
                const desc = document.getElementById('t-desc').value;
                this.tasks.push({id:"ATR-"+Date.now().toString().slice(-3), desc, status:"Open"});
                localStorage.setItem('jsaw_atr_tasks', JSON.stringify(this.tasks));
                this.renderTables(); this.showSec('sec-tasks');
            },
            initZones: function() {
                document.getElementById('z-sel').innerHTML = '<option>Operations</option>';
            },
            logout: function() { location.reload(); }
        };
        app.init();
    </script>
</body>
</html>
